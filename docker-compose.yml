version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: aia-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: aia-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aia-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c ':> /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aia-api
    env_file:
      - .env
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      MONGO_URL: ${MONGO_URL:-mongodb://mongo:27017}
    depends_on:
      mongo:
        condition: service_started
      redis:
        condition: service_started
      qdrant:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  qdrant_data:
  redis_data:
  mongo_data:
