version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aia-qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aia-api
    env_file:
      - .env
    environment:
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
    depends_on:
      - qdrant
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  qdrant_data:
